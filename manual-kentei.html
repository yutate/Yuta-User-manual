<html lang="ja">
<head>
<meta charset="UTF-8"/>

<title>寺地祐太・取扱説明書検定</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#FFF8E7;font-family:'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif;color:#333;min-height:100vh;}
button{font-family:inherit;cursor:pointer;border:none;}
.hero{position:relative;overflow:hidden;padding:36px 24px 32px;text-align:center;}
.deco{position:absolute;border-radius:50%;pointer-events:none;}
.container{max-width:560px;margin:0 auto;padding:24px 16px 60px;}
.card{background:#fff;border-radius:20px;padding:28px 24px;box-shadow:0 4px 24px rgba(0,0,0,0.08);margin-bottom:16px;}
.progress-bar{height:6px;background:#eee;border-radius:3px;overflow:hidden;margin-bottom:20px;}
.progress-fill{height:100%;border-radius:3px;transition:width 0.4s ease;}
.choice{width:100%;padding:14px 16px;border-radius:12px;border:2px solid #eee;background:#fff;text-align:left;font-size:14px;color:#333;margin-bottom:10px;transition:all 0.15s;display:block;line-height:1.5;}
.choice:hover{border-color:#ddd;background:#fafafa;}
.choice.correct{border-color:#00A86B!important;background:#EEFFF8!important;color:#00A86B;font-weight:700;}
.choice.wrong{border-color:#FF4F7B!important;background:#FFF0F4!important;color:#FF4F7B;}
.choice:disabled{cursor:default;}
.explanation{border-radius:12px;padding:14px;margin-top:4px;font-size:13px;line-height:1.7;display:none;}
.explanation.show{display:block;}
.level-btn{flex:1;padding:16px 8px;border-radius:14px;font-size:14px;font-weight:800;transition:all 0.2s;border:2px solid transparent;}
.score-circle{width:120px;height:120px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 20px;border:5px solid;}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi 0.25s ease;}
@keyframes pop{0%{transform:scale(0.85);opacity:0}70%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
.pop{animation:pop 0.3s ease;}
@keyframes unlock{0%{transform:scale(0.5) rotate(-10deg);opacity:0}60%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1) rotate(0);opacity:1}}
.unlock{animation:unlock 0.5s ease;}
</style>
</head>

var state = {
  screen: "top", // top / quiz / level-result / final
  level: null,
  current: 0,
  score: 0,
  answered: false,
  userAnswers: [],
  cleared: [],
};

function renderHero(){
  var colors = {beginner:"#00A86B", intermediate:"#0077DD", advanced:"#8844DD"};
  var c = state.level ? colors[state.level] : "#FF4F7B";
  var grad = state.level ? LEVELS[state.level].grad : "linear-gradient(135deg,#1a1a2e,#2d2d4e)";
  document.getElementById('hero-area').innerHTML =
    '<div class="hero" style="background:'+grad+'">'+
    '<div class="deco" style="width:200px;height:200px;top:-70px;left:-50px;background:rgba(255,255,255,0.08)"></div>'+
    '<div class="deco" style="width:120px;height:120px;top:-20px;right:-30px;background:rgba(255,255,255,0.08)"></div>'+
    '<p style="font-size:11px;letter-spacing:4px;color:rgba(255,255,255,0.7);font-weight:700;margin-bottom:8px;">TEAM MEMBER MANUAL</p>'+
    '<h1 style="font-size:clamp(26px,6vw,44px);font-weight:900;color:#fff;text-shadow:3px 3px 0 rgba(0,0,0,0.15);line-height:1.1;margin-bottom:8px;">寺地祐太<br>取扱説明書検定</h1>'+
    '<p style="font-size:13px;color:rgba(255,255,255,0.85);">初級・中級・上級｜各10問</p>'+
    '</div>';
}

function render(){
  renderHero();
  if(state.screen==="top") renderTop();
  else if(state.screen==="quiz") renderQuestion();
  else if(state.screen==="level-result") renderLevelResult();
  else if(state.screen==="final") renderFinal();
}

function renderTop(){

                 id==="advanced" && state.cleared.indexOf("intermediate")<0;

      '<button style="width:100%;padding:12px;border-radius:10px;background:#eee;color:#bbb;font-size:14px;font-weight:800;margin-top:12px;">🔒 前のレベルをクリアしてから</button>' :
      '<button onclick="startLevel(\''+id+'\')" style="width:100%;padding:12px;border-radius:10px;background:'+lv.grad+';color:#fff;font-size:14px;font-weight:800;margin-top:12px;box-shadow:0 3px 12px rgba(0,0,0,0.15);">'+(cleared?'もう一度チャレンジ 🔄':'検定スタート →')+'</button>';
    return '<div class="card fi" style="border:'+(cleared?'2px solid '+lv.color:'2px solid #eee')+'">'+
      '<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">'+
      '<div style="width:52px;height:52px;border-radius:14px;background:'+lv.grad+';display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;">'+lv.emoji+(cleared?'✅':'')+'</div>'+
      '<div><p style="font-size:18px;font-weight:900;color:#1a1a1a">'+lv.label+'検定</p>'+
      '<p style="font-size:12px;color:'+lv.color+';font-weight:700">合格ライン: '+lv.pass+'/10問以上</p></div></div>'+
      '<p style="font-size:13px;color:#777;line-height:1.65;margin-bottom:4px">'+lv.desc+'</p>'+
      (id==="advanced"?'<p style="font-size:12px;color:#FF4F7B;font-weight:700;margin-top:4px">⚠️ 取扱説明書通りじゃない問題も出るよ！</p>':'')+
      btn+'</div>';
  }).join('');

  var allCleared = state.cleared.indexOf("beginner")>=0 && state.cleared.indexOf("intermediate")>=0 && state.cleared.indexOf("advanced")>=0;
  var finalMsg = allCleared ? '<div class="card" style="background:linear-gradient(135deg,#1a1a2e,#2d2d4e);text-align:center;padding:24px"><p style="font-size:32px;margin-bottom:8px">🏆</p><p style="font-size:16px;font-weight:900;color:#D4A843;margin-bottom:4px">全レベル制覇！</p><p style="font-size:13px;color:rgba(255,255,255,0.8)">あなたは真の寺地祐太攻略者です</p></div>' : '';

  document.getElementById('app').innerHTML = '<div class="fi">'+cards+finalMsg+'</div>';
}

function startLevel(id){
  state.level = id;
  state.current = 0;
  state.score = 0;
  state.answered = false;
  state.userAnswers = [];
  state.screen = "quiz";
  render();
}

function renderQuestion(){
  var lv = LEVELS[state.level];
  var q = lv.questions[state.current];
  var pct = (state.current/lv.questions.length*100).toFixed(0);

  var topHtml = q.scenario ?
    '<div style="background:#f8f8f8;border-radius:12px;padding:14px;margin-bottom:18px;font-size:14px;color:#444;line-height:1.7;border-left:3px solid '+lv.color+'">💬 '+q.scenario+'</div>' :
    '<p style="font-size:16px;font-weight:700;color:#1a1a1a;line-height:1.7;margin-bottom:20px">'+q.q+'</p>';

  var choicesHtml = q.choices.map(function(c,i){
    return '<button class="choice" onclick="selectAnswer('+i+')" id="c'+i+'">'+
      '<span style="display:inline-block;width:24px;height:24px;border-radius:50%;background:#f0f0f0;color:#888;font-size:11px;font-weight:800;text-align:center;line-height:24px;margin-right:8px;vertical-align:middle;flex-shrink:0">'+String.fromCharCode(65+i)+'</span>'+c+'</button>';
  }).join('');

  document.getElementById('app').innerHTML =
    '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%;background:'+lv.grad+'"></div></div>'+
    '<div class="card fi">'+
    '<div style="font-size:11px;font-weight:800;letter-spacing:2px;color:'+lv.color+';margin-bottom:8px">'+lv.emoji+' '+lv.label+'検定 | Q'+(state.current+1)+'/'+lv.questions.length+' — '+q.sec+'</div>'+
    topHtml+
    '<div id="choices">'+choicesHtml+'</div>'+
    '<div class="explanation" id="exp"></div>'+
    '</div>';
}

function selectAnswer(idx){
  if(state.answered) return;
  state.answered = true;
  var lv = LEVELS[state.level];
  var q = lv.questions[state.current];
  var correct = q.correct;
  state.userAnswers.push({chosen:idx,correct:correct,sec:q.sec});
  if(idx===correct) state.score++;

  for(var i=0;i<q.choices.length;i++){
    var btn = document.getElementById('c'+i);
    btn.disabled = true;
    if(i===correct) btn.className='choice correct';
    else if(i===idx) btn.className='choice wrong';
  }

  var isOk = idx===correct;
  var exp = document.getElementById('exp');
  exp.style.background = isOk?'#EEFFF8':'#FFF0F4';
  exp.style.border = '1px solid '+(isOk?'#00A86B33':'#FF4F7B33');
  exp.innerHTML = (isOk?
    '<p style="font-weight:800;color:#00A86B;font-size:14px;margin-bottom:6px">✅ 正解！</p>':
    '<p style="font-weight:800;color:#FF4F7B;font-size:14px;margin-bottom:6px">❌ 不正解…</p>')+
    '<p style="font-size:13px;color:#555;line-height:1.7">'+q.exp+'</p>';
  exp.className='explanation show pop';

  setTimeout(function(){
    var isLast = state.current+1 >= lv.questions.length;
    document.getElementById('choices').insertAdjacentHTML('afterend',
      '<button onclick="nextQuestion()" style="width:100%;padding:14px;border-radius:12px;background:'+(isOk?lv.color:'#333')+';color:#fff;font-size:15px;font-weight:800;margin-top:16px;">'+(isLast?'結果を見る 🎯':'次の問題へ →')+'</button>'
    );
  },300);
}

function nextQuestion(){
  state.current++;
  state.answered=false;
  window.scrollTo(0,0);
  var lv = LEVELS[state.level];
  if(state.current>=lv.questions.length){
    state.screen="level-result";
    var passed = state.score>=lv.pass;
    if(passed && state.cleared.indexOf(state.level)<0) state.cleared.push(state.level);
  }
  render();
}

function renderLevelResult(){
  var lv = LEVELS[state.level];
  var pct = Math.round(state.score/lv.questions.length*100);
  var passed = state.score>=lv.pass;
  var rankIdx = state.score>=9?2:state.score>=7?1:0;
  var rank = lv.rank[rankIdx];

  var reviewHtml = state.userAnswers.map(function(a,i){
    var q = lv.questions[i];
    var ok = a.chosen===a.correct;
    return '<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0">'+
      '<span style="font-size:18px;flex-shrink:0">'+(ok?'✅':'❌')+'</span>'+
      '<div><p style="font-size:12px;color:'+lv.color+';font-weight:700;margin-bottom:2px">'+a.sec+'</p>'+
      '<p style="font-size:13px;color:#333;line-height:1.5">'+(q.scenario||q.q).slice(0,32)+'…</p>'+
      (ok?'':'<p style="font-size:12px;color:#FF4F7B;margin-top:3px">正解: '+q.choices[a.correct].slice(0,22)+'…</p>')+
      '</div></div>';
  }).join('');

  var nextArea = "";
  if(passed){
    if(state.level==="beginner" && state.cleared.indexOf("intermediate")<0)
      nextArea='<button onclick="startLevel(\'intermediate\')" style="width:100%;padding:14px;border-radius:12px;background:'+LEVELS.intermediate.grad+';color:#fff;font-size:15px;font-weight:800;margin-bottom:10px;">中級検定へ進む ⚡</button>';
    else if(state.level==="intermediate" && state.cleared.indexOf("advanced")<0)
      nextArea='<button onclick="startLevel(\'advanced\')" style="width:100%;padding:14px;border-radius:12px;background:'+LEVELS.advanced.grad+';color:#fff;font-size:15px;font-weight:800;margin-bottom:10px;">上級検定へ進む 🔥</button>';
    else if(state.level==="advanced")
      nextArea='<div style="background:linear-gradient(135deg,#1a1a2e,#2d2d4e);border-radius:14px;padding:20px;text-align:center;margin-bottom:10px"><p style="font-size:28px;margin-bottom:8px">🏆</p><p style="font-size:15px;font-weight:900;color:#D4A843">全レベル制覇おめでとう！</p><p style="font-size:13px;color:rgba(255,255,255,0.8);margin-top:6px">あなたは真の寺地祐太攻略者です</p></div>';
  }

  document.getElementById('app').innerHTML =
    '<div class="card fi" style="text-align:center">'+
    '<div style="font-size:40px;margin-bottom:12px">'+(passed?lv.emoji+'✅':'💦')+'</div>'+
    '<div class="score-circle pop" style="border-color:'+lv.color+'">'+
    '<p style="font-size:32px;font-weight:900;color:'+lv.color+'">'+state.score+'</p>'+
    '<p style="font-size:12px;color:#aaa;font-weight:700">/ 10問</p></div>'+
    '<span style="display:inline-block;font-size:13px;font-weight:800;padding:5px 14px;border-radius:20px;color:'+lv.color+';background:'+lv.bg+';border:1.5px solid '+lv.color+';margin-bottom:12px">'+rank+'</span>'+
    '<p style="font-size:22px;font-weight:900;color:#1a1a1a;margin-bottom:8px">正解率 '+pct+'%</p>'+
    '<p style="font-size:14px;color:'+lv.color+';font-weight:700;margin-bottom:20px">'+(passed?'🎉 合格！（'+lv.pass+'問以上正解）':'🔄 もう少し！（合格は'+lv.pass+'問以上）')+'</p>'+
    '<div style="text-align:left;margin-bottom:24px">'+
    '<p style="font-size:11px;font-weight:800;color:#bbb;letter-spacing:2px;margin-bottom:10px">▼ 問題別結果</p>'+
    reviewHtml+'</div>'+
    nextArea+
    '<button onclick="startLevel(\''+state.level+'\')" style="width:100%;padding:13px;border-radius:12px;background:#333;color:#fff;font-size:14px;font-weight:800;margin-bottom:10px;">もう一度この検定を受ける 🔄</button>'+
    '<button onclick="backToTop()" style="width:100%;padding:13px;border-radius:12px;background:#f0f0f0;color:#555;font-size:14px;font-weight:800;">トップに戻る</button>'+
    '</div>';
}

function backToTop(){
  state.screen="top"; state.level=null; render();
}

render();
</script>
</body>
</html>
