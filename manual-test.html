<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>寺地祐太攻略検定</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#FFF8E7;font-family:'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif;color:#333;min-height:100vh;}
button{font-family:inherit;cursor:pointer;border:none;}

.hero{background:linear-gradient(135deg,#FF4F7B 0%,#FF8040 55%,#FFB800 100%);padding:36px 24px 32px;position:relative;overflow:hidden;text-align:center;}
.deco{position:absolute;border-radius:50%;background:rgba(255,255,255,0.15);pointer-events:none;}

.container{max-width:560px;margin:0 auto;padding:24px 16px 60px;}

/* スタート画面 */
.start-card{background:#fff;border-radius:20px;padding:32px 24px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.08);}

/* 問題カード */
.q-card{background:#fff;border-radius:20px;padding:24px;box-shadow:0 4px 24px rgba(0,0,0,0.08);margin-bottom:16px;}
.q-num{font-size:11px;font-weight:800;letter-spacing:2px;margin-bottom:8px;}
.q-text{font-size:16px;font-weight:700;color:#1a1a1a;line-height:1.7;margin-bottom:20px;}
.q-scenario{background:#f8f8f8;border-radius:12px;padding:14px;margin-bottom:20px;font-size:14px;color:#555;line-height:1.7;border-left:3px solid #ddd;}

/* 選択肢 */
.choice{width:100%;padding:14px 16px;border-radius:12px;border:2px solid #eee;background:#fff;text-align:left;font-size:14px;color:#333;margin-bottom:10px;transition:all 0.15s;display:block;line-height:1.5;}
.choice:hover{border-color:#ddd;background:#fafafa;}
.choice.correct{border-color:#00A86B;background:#EEFFF8;color:#00A86B;font-weight:700;}
.choice.wrong{border-color:#FF4F7B;background:#FFF0F4;color:#FF4F7B;}
.choice.show-correct{border-color:#00A86B;background:#EEFFF8;}
.choice:disabled{cursor:default;}

/* 解説 */
.explanation{border-radius:12px;padding:14px;margin-top:4px;font-size:13px;line-height:1.7;display:none;}
.explanation.show{display:block;}

/* プログレス */
.progress-bar{height:6px;background:#eee;border-radius:3px;overflow:hidden;margin-bottom:20px;}
.progress-fill{height:100%;border-radius:3px;transition:width 0.4s ease;}

/* 結果画面 */
.result-card{background:#fff;border-radius:20px;padding:32px 24px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.08);}
.score-circle{width:140px;height:140px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 24px;border:6px solid;}
.rank-badge{display:inline-block;font-size:13px;font-weight:800;padding:6px 16px;border-radius:20px;margin-bottom:16px;}
.result-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0;text-align:left;}

@keyframes pop{0%{transform:scale(0.8);opacity:0}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
.pop{animation:pop 0.3s ease;}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi 0.25s ease;}
</style>
</head>
<body>

<div class="hero">
  <div class="deco" style="width:180px;height:180px;top:-60px;left:-40px;"></div>
  <div class="deco" style="width:100px;height:100px;top:-20px;right:-20px;"></div>
  <p style="font-size:11px;letter-spacing:4px;color:rgba(255,255,255,0.8);font-weight:700;margin-bottom:8px;">SECRET BACK MANUAL</p>
  <h1 style="font-size:clamp(28px,6vw,48px);font-weight:900;color:#fff;text-shadow:3px 3px 0 rgba(0,0,0,0.12);line-height:1.1;margin-bottom:8px;">寺地祐太<br>攻略検定</h1>
  <p style="font-size:13px;color:rgba(255,255,255,0.9);">裏マニュアル理解度テスト｜全10問</p>
</div>

<div class="container" id="app"></div>

<script>
var questions = [
  // SEC.01 議論・反論
  {
    sec:"議論・反論対処法", secColor:"#FF6B00",
    type:"scenario",
    scenario:"突然「それって本当に正しいの？」と寺地祐太に言われた。あなたはどう返す？",
    choices:[
      "「え、あ、はい…そうだと思います…」とモゴモゴ答える",
      "「鋭いですね！実は私もここ迷ってて、AとBの二択で考えてました」",
      "「間違っていたら申し訳ありません」と即座に謝る",
      "「なぜそう思うんですか？」と逆に問い返す"
    ],
    correct:1,
    explanation:"完璧な答えより思考プロセスを見せると評価爆上がり。寺地祐太は「考えてる人」が大好物です。謝るのは最悪手！"
  },
  {
    sec:"議論・反論対処法", secColor:"#FF6B00",
    type:"quiz",
    question:"議論が長引いてもう終わらせたい。正しい終わらせ方はどれ？",
    choices:[
      "「すみません、もう時間がないので」と打ち切る",
      "黙って話が終わるのを待つ",
      "「この話めちゃ面白いです！一旦整理させてください。続き明日でもいいですか？」",
      "「わかりました、あなたの言う通りにします」と同意する"
    ],
    correct:2,
    explanation:"「面白い」と言いながら区切るのがポイント。肯定で終わると気持ちよく終われます。絶対に無理やり打ち切らないこと！"
  },
  // SEC.02 褒め方
  {
    sec:"褒め方・モチベ爆上げ術", secColor:"#E8A000",
    type:"quiz",
    question:"寺地祐太を褒めるとき、最も効果的な褒め方はどれ？",
    choices:[
      "「さすがです！本当にすごいですね！」と何度も伝える",
      "「先週のアドバイスのおかげで〇〇ができるようになりました！」と変化を伝える",
      "「前の上司より全然いいです」と比較して褒める",
      "LINEでスタンプを大量に送る"
    ],
    correct:1,
    explanation:"「変化・成長」を具体的に伝えるのが最強の褒め言葉。お世辞は即バレするので逆効果です。比較もNGです！"
  },
  {
    sec:"褒め方・モチベ爆上げ術", secColor:"#E8A000",
    type:"scenario",
    scenario:"寺地祐太の出したアイデアをチームで実行したら好成績が出た。どう報告する？",
    choices:[
      "特に報告せず普通に業務を続ける",
      "「あのアイデア、チームで試したら〇〇という結果が出ました！」と報告する",
      "「今回はうまくいきましたね」とさらっと伝える",
      "「チーム全員で頑張りました」と自分たちの成果として報告する"
    ],
    correct:1,
    explanation:"「あなたのアイデアが現実になった」という報告は着想エンジンへの最高のフィードバック。これをやるかやらないかで信頼度が全然変わります！"
  },
  // SEC.03 アイデア引き出し
  {
    sec:"アイデアの引き出し方", secColor:"#00A86B",
    type:"quiz",
    question:"寺地祐太にアイデアを相談するとき、最も効果的な切り出し方は？",
    choices:[
      "「どうすればいいですか？答えを教えてください」",
      "「ちょっと相談していいですか。答えじゃなくて一緒に考えてほしくて」",
      "「これをやれと上から言われたんですが…」",
      "「暇なときでいいんですけど…」"
    ],
    correct:1,
    explanation:"「一緒に考えてほしい」が魔法の言葉。「答えを聞きに来た」より3倍いい反応が返ってきます。成長促進スイッチが入ります！"
  },
  {
    sec:"アイデアの引き出し方", secColor:"#00A86B",
    type:"scenario",
    scenario:"アイデアを相談したら大量のアイデアが出てきて収拾がつかなくなった。どうする？",
    choices:[
      "全部メモしてあとでゆっくり整理する",
      "「今日の一番はどれですか？」と絞る質問をする",
      "「少し考える時間をください」とその場を離れる",
      "「もうわかりました！」と話を打ち切る"
    ],
    correct:1,
    explanation:"「今日の一番は？」と絞る質問が正解。寺地祐太が自分で整理してくれます。全部メモはいいけど絞らないと実行できません！"
  },
  // SEC.04 シャットダウン
  {
    sec:"シャットダウン復活術", secColor:"#0077DD",
    type:"quiz",
    question:"寺地祐太が急に静かになり返事が短くなってきた。まず何をすべき？",
    choices:[
      "「大丈夫ですか！？何があったんですか？」と心配して声をかける",
      "「元気出してください！」と励ます",
      "様子を見て、声かけるなら「最近どうですか？」の一言だけ",
      "チーム全員で声をかけに行く"
    ],
    correct:2,
    explanation:"まず休ませること！「大丈夫ですか？」も逆効果。ライトな一言だけにとどめて、深追いしないのが正解です。"
  },
  {
    sec:"シャットダウン復活術", secColor:"#0077DD",
    type:"scenario",
    scenario:"寺地祐太が完全シャットダウン状態。PHASE3の最終兵器として最も効果的な言葉は？",
    choices:[
      "「早く元気になってください、チームが困ってます」",
      "「仕事なんだからしっかりしてください」",
      "「寺地祐太がいなかったら、このチームどうなってたんだろうって思うことがあって」",
      "「とりあえず飲みに行きましょう」"
    ],
    correct:2,
    explanation:"運命思考への直撃弾。「あなたの存在に意味がある」という言葉が刺さります。ただし最終兵器なので乱発厳禁！"
  },
  // SEC.05 最大限活用
  {
    sec:"最大限に利用する方法", secColor:"#8844DD",
    type:"quiz",
    question:"寺地祐太をキャリア相談の相手として活用したいとき、最も効果的な聞き方は？",
    choices:[
      "「私はどうすればいいですか？」と丸投げする",
      "「私の強みって何だと思いますか？」と自己分析を依頼する",
      "「上司として適切なアドバイスをください」と命令する",
      "「みんなはどうしてるんですかね？」と一般論を聞く"
    ],
    correct:1,
    explanation:"「私の強みって何だと思いますか？」は成長促進スイッチが即起動する最強の質問。鋭い答えが返ってきます！"
  },
  {
    sec:"最大限に利用する方法", secColor:"#8844DD",
    type:"scenario",
    scenario:"寺地祐太にお世話になったとき、最も関係を深める行動はどれ？",
    choices:[
      "「ありがとうございました！」とお礼を言って終わる",
      "後日「あのアドバイスを実行したら〇〇でした！」と結果を報告する",
      "お菓子を持ってお礼に行く",
      "SNSで感謝の投稿をする"
    ],
    correct:1,
    explanation:"結果の報告が最高のお礼！成長促進への最高のフィードバックになり、次の相談がより深くなります。報告する部下は可愛がられます（ガチで）。"
  },
];

var current = 0;
var score = 0;
var answered = false;
var userAnswers = [];

function render(){
  if(current === -1){ renderStart(); return; }
  if(current >= questions.length){ renderResult(); return; }
  renderQuestion();
}

function renderStart(){
  document.getElementById('app').innerHTML =
    '<div class="start-card fi">'+
    '<div style="font-size:64px;margin-bottom:16px">📋</div>'+
    '<h2 style="font-size:22px;font-weight:900;color:#1a1a1a;margin-bottom:8px">寺地祐太攻略検定</h2>'+
    '<p style="font-size:14px;color:#888;line-height:1.7;margin-bottom:24px">裏マニュアルをちゃんと読んだか確認するテストです。<br>全10問・4択＆シナリオ選択のミックス形式。<br>正直に答えてね😊</p>'+
    '<div style="display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:28px">'+
    '<span style="font-size:12px;font-weight:800;padding:4px 12px;border-radius:20px;color:#FF6B00;background:#FF6B0018;border:1.5px solid #FF6B00">議論対処</span>'+
    '<span style="font-size:12px;font-weight:800;padding:4px 12px;border-radius:20px;color:#E8A000;background:#E8A00018;border:1.5px solid #E8A000">褒め方</span>'+
    '<span style="font-size:12px;font-weight:800;padding:4px 12px;border-radius:20px;color:#00A86B;background:#00A86B18;border:1.5px solid #00A86B">アイデア</span>'+
    '<span style="font-size:12px;font-weight:800;padding:4px 12px;border-radius:20px;color:#0077DD;background:#0077DD18;border:1.5px solid #0077DD">復活術</span>'+
    '<span style="font-size:12px;font-weight:800;padding:4px 12px;border-radius:20px;color:#8844DD;background:#8844DD18;border:1.5px solid #8844DD">最大活用</span>'+
    '</div>'+
    '<button onclick="startTest()" style="width:100%;padding:16px;border-radius:14px;background:linear-gradient(135deg,#FF4F7B,#FF8040);color:#fff;font-size:16px;font-weight:900;letter-spacing:1px;box-shadow:0 4px 16px rgba(255,79,123,0.4);">検定スタート 🚀</button>'+
    '</div>';
}

function renderQuestion(){
  var q = questions[current];
  var pct = (current/questions.length*100).toFixed(0);
  var choicesHtml = q.choices.map(function(c,i){
    return '<button class="choice" onclick="selectAnswer('+i+')" id="c'+i+'">'+
      '<span style="display:inline-block;width:24px;height:24px;border-radius:50%;background:#f0f0f0;color:#888;font-size:11px;font-weight:800;text-align:center;line-height:24px;margin-right:8px;flex-shrink:0">'+String.fromCharCode(65+i)+'</span>'+
      c+'</button>';
  }).join('');

  var typeLabel = q.type==='scenario' ?
    '<span style="font-size:11px;font-weight:800;padding:2px 8px;border-radius:10px;background:#1a1a2e;color:#D4A843;margin-bottom:8px;display:inline-block">📌 シナリオ問題</span>' :
    '<span style="font-size:11px;font-weight:800;padding:2px 8px;border-radius:10px;background:#f0f0f0;color:#666;margin-bottom:8px;display:inline-block">📝 知識問題</span>';

  var scenarioHtml = q.scenario ?
    '<div class="q-scenario">💬 '+q.scenario+'</div>' : '';
  var questionHtml = q.question ?
    '<div class="q-text">'+q.question+'</div>' : '';

  document.getElementById('app').innerHTML =
    '<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#FF4F7B,#FF8040)"></div></div>'+
    '<div class="q-card fi">'+
    '<div class="q-num" style="color:'+q.secColor+'">'+q.sec+'｜Q'+(current+1)+' / '+questions.length+'</div>'+
    typeLabel+
    scenarioHtml+questionHtml+
    '<div id="choices">'+choicesHtml+'</div>'+
    '<div class="explanation" id="exp"></div>'+
    '</div>';
}

function selectAnswer(idx){
  if(answered) return;
  answered = true;
  var q = questions[current];
  var correct = q.correct;
  userAnswers.push({q:current, chosen:idx, correct:correct});
  if(idx===correct) score++;

  // 色付け
  for(var i=0;i<q.choices.length;i++){
    var btn = document.getElementById('c'+i);
    btn.disabled = true;
    if(i===correct){ btn.className='choice correct'; }
    else if(i===idx){ btn.className='choice wrong'; }
  }

  // 解説表示
  var exp = document.getElementById('exp');
  var isCorrect = idx===correct;
  exp.style.background = isCorrect ? '#EEFFF8' : '#FFF0F4';
  exp.style.border = '1px solid '+(isCorrect?'#00A86B33':'#FF4F7B33');
  exp.innerHTML = (isCorrect?'<p style="font-weight:800;color:#00A86B;margin-bottom:6px;font-size:14px">✅ 正解！</p>':'<p style="font-weight:800;color:#FF4F7B;margin-bottom:6px;font-size:14px">❌ 不正解…</p>')+
    '<p style="font-size:13px;color:#555;line-height:1.7">'+q.explanation+'</p>';
  exp.className='explanation show pop';

  // 次へボタン追加
  setTimeout(function(){
    var choices = document.getElementById('choices');
    var nextLabel = current+1 >= questions.length ? '結果を見る 🎯' : '次の問題へ →';
    choices.insertAdjacentHTML('afterend',
      '<button onclick="nextQuestion()" style="width:100%;padding:14px;border-radius:12px;background:'+(isCorrect?'#00A86B':'#333')+';color:#fff;font-size:15px;font-weight:800;margin-top:16px;">'+nextLabel+'</button>'
    );
  },400);
}

function nextQuestion(){
  current++;
  answered = false;
  window.scrollTo(0,0);
  render();
}

function startTest(){
  current=0; score=0; answered=false; userAnswers=[];
  render();
}

function renderResult(){
  var pct = Math.round(score/questions.length*100);
  var rank, rankColor, rankBg, msg, emoji;
  if(pct>=90){rank="🏆 裏マニュアル師匠";rankColor="#D4A843";rankBg="#D4A84318";msg="完璧です。もはや寺地祐太の取扱説明書を書けるレベル。裏マニュアルを部下に教える立場になれます。";emoji="🥇";}
  else if(pct>=70){rank="⭐ 攻略上級者";rankColor="#4ECDC4";rankBg="#4ECDC418";msg="よく理解できています！ほとんどの場面で正しく対処できるはず。あと少しで師匠レベルです。";emoji="😄";}
  else if(pct>=50){rank="📚 修行中";rankColor="#E8A000";rankBg="#E8A00018";msg="基本はわかっています。でもまだ咄嗟に動けない場面がありそう。裏マニュアルを読み直してみて！";emoji="😅";}
  else{rank="🌱 まだまだ新米";rankColor="#FF6B6B";rankBg="#FF6B6B18";msg="もう一度裏マニュアルをちゃんと読もう！寺地祐太攻略への道は長い…でも大丈夫、読めばわかります。";emoji="😱";}

  var reviewHtml = userAnswers.map(function(a,i){
    var q = questions[a.q];
    var ok = a.chosen===a.correct;
    return '<div class="result-item">'+
      '<span style="font-size:20px;flex-shrink:0">'+(ok?'✅':'❌')+'</span>'+
      '<div><p style="font-size:12px;color:'+q.secColor+';font-weight:700;margin-bottom:2px">'+q.sec+'</p>'+
      '<p style="font-size:13px;color:#333;line-height:1.5">'+(q.question||q.scenario).slice(0,35)+'…</p>'+
      (ok?'':'<p style="font-size:12px;color:#FF4F7B;margin-top:3px">正解: '+q.choices[a.correct].slice(0,20)+'…</p>')+
      '</div></div>';
  }).join('');

  document.getElementById('app').innerHTML =
    '<div class="result-card fi">'+
    '<div style="font-size:48px;margin-bottom:12px">'+emoji+'</div>'+
    '<div class="score-circle" style="border-color:'+rankColor+'">'+
    '<p style="font-size:36px;font-weight:900;color:'+rankColor+'">'+score+'</p>'+
    '<p style="font-size:13px;color:#aaa;font-weight:700">/ '+questions.length+'問</p>'+
    '</div>'+
    '<span class="rank-badge" style="color:'+rankColor+';background:'+rankBg+';border:1.5px solid '+rankColor+'">'+rank+'</span>'+
    '<p style="font-size:22px;font-weight:900;color:#1a1a1a;margin-bottom:12px">正解率 '+pct+'%</p>'+
    '<p style="font-size:14px;color:#555;line-height:1.7;margin-bottom:28px">'+msg+'</p>'+
    '<div style="text-align:left;margin-bottom:28px">'+
    '<p style="font-size:12px;font-weight:800;color:#bbb;letter-spacing:2px;margin-bottom:12px">▼ 問題別結果</p>'+
    reviewHtml+'</div>'+
    '<button onclick="startTest()" style="width:100%;padding:14px;border-radius:12px;background:linear-gradient(135deg,#FF4F7B,#FF8040);color:#fff;font-size:15px;font-weight:800;margin-bottom:10px;">もう一度チャレンジ 🔄</button>'+
    '<p style="font-size:12px;color:#ccc;margin-top:8px;letter-spacing:1px">🔒 寺地祐太攻略検定 v1.0</p>'+
    '</div>';
}

// 初期化
current = -1;
render();
</script>
</body>
</html>
