<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#FFF8E7;font-family:'Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif;color:#333;}
button{font-family:inherit;cursor:pointer;}

.hero{background:linear-gradient(135deg,#FF4F7B 0%,#FF8040 55%,#FFB800 100%);position:relative;overflow:hidden;}
.hero-inner{max-width:1200px;margin:0 auto;padding:40px 32px 36px;position:relative;}
.deco{position:absolute;border-radius:50%;background:rgba(255,255,255,0.18);pointer-events:none;}

@media(min-width:960px){
  .body-grid{display:grid;grid-template-columns:1fr minmax(0,620px) 280px 1fr;background:#FFF8E7;}
  .col-left{grid-column:1/2;}
  .col-main{grid-column:2/3;padding:32px 24px 80px;}
  .col-side{grid-column:3/4;padding:32px 20px 80px;}
  .col-right{grid-column:4/5;}
  .bottom-tabs{display:none!important;}
}
@media(max-width:959px){
  .body-grid{display:block;background:#FFF8E7;}
  .col-left,.col-right,.col-side{display:none;}
  .col-main{padding:20px 16px 90px;}
  .bottom-tabs{display:flex!important;}
  .hero-inner{padding:28px 20px 28px;}
}

.nav-item{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border-radius:14px;margin-bottom:8px;background:#fff;border:2px solid #eee;cursor:pointer;transition:all 0.15s;}
.nav-item:hover{border-color:#ddd;background:#fafafa;}
.card{background:#fff;border-radius:16px;border:2px solid #eee;overflow:hidden;margin-bottom:16px;}

@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi 0.2s ease;}

.bottom-tabs{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;overflow-x:auto;padding:0 2px;z-index:100;box-shadow:0 -2px 16px rgba(0,0,0,0.07);}
.tab-btn{flex-shrink:0;flex:1;min-width:52px;padding:9px 6px 7px;border:none;border-top:3px solid transparent;background:transparent;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all 0.15s;}

/* シナリオ */
.sc-head{padding:15px 16px;display:flex;justify-content:space-between;align-items:center;gap:8px;cursor:pointer;background:#fff;}
.sc-head:hover{background:#fafafa;}
.sc-body{display:none;padding:0 16px 16px;background:#fafafa;}
.sc-body.open{display:block;}
</style>

function h(tag, attrs, content) {

  }).join(' ');
  return '<'+tag+' '+a+'>'+( content||'')+'</'+tag+'>';
}

function badge(text, color) {
  return '<span style="display:inline-block;font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;color:'+color+';background:'+color+'20;border:1.5px solid '+color+'">'+text+'</span>';

function toggleSc(uid, color) {
  var body = document.getElementById('sc'+uid+'b');
  var arr  = document.getElementById('sc'+uid+'a');
  var card = document.getElementById('sc'+uid);
  var open = body.classList.toggle('open');
  arr.style.transform = open ? 'rotate(180deg)' : 'rotate(0)';
  card.style.borderColor = open ? color : '#eee';
}

function goSec(id) {
  active = id;
  var s = SECS.find(function(x){return x.id===id;});

  // メインコンテンツ
  var mc = document.getElementById('main-content');
  mc.className = 'fi';
  mc.innerHTML = PAGES[id](s);
  void mc.offsetWidth;

  // ドット更新
  var dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = SECS.map(function(x){
    var w = x.id===id ? '28px' : '8px';
    var bg = x.id===id ? x.color : '#ddd';
    return '<div onclick="goSec(\''+x.id+'\')" style="width:'+w+';height:8px;border-radius:4px;background:'+bg+';cursor:pointer;transition:all 0.3s;display:inline-block"></div>';
  }).join('');

  // サイドナビ更新
  var sn = document.getElementById('side-nav');
  if(sn) {
    sn.innerHTML = SECS.map(function(x){
      var isCur = x.id===id;
      var bc = isCur ? x.color : '#eee';
      var ic = isCur ? x.color : '#f5f5f5';
      var tc = isCur ? x.color : '#333';
      return '<div class="nav-item" style="border-color:'+bc+'" onclick="goSec(\''+x.id+'\')">'+
        '<div style="display:flex;align-items:center;gap:10px">'+
        '<div style="width:38px;height:38px;border-radius:10px;background:'+ic+';display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">'+x.icon+'</div>'+
        '<div><p style="margin:0;font-size:11px;color:#bbb;font-weight:700">'+x.code+'</p>'+
        '<p style="margin:0;font-size:13px;font-weight:700;color:'+tc+'">'+x.label+'</p></div></div>'+
        '<span style="color:'+(isCur?x.color:'#ccc')+';font-size:18px">›</span></div>';
    }).join('');
  }

  // ボトムタブ更新
  var bt = document.getElementById('bottom-tabs');
  bt.innerHTML = SECS.map(function(x){
    var isCur = x.id===id;
    var tc = isCur ? x.color : '#bbb';
    var bc = isCur ? x.color : 'transparent';
    return '<button class="tab-btn" style="border-top-color:'+bc+'" onclick="goSec(\''+x.id+'\')">'+
      '<span style="font-size:20px">'+x.icon+'</span>'+
      '<span style="font-size:9px;font-weight:800;color:'+tc+';letter-spacing:0.3px;white-space:nowrap">'+x.label.slice(0,5)+'</span></button>';
  }).join('');

  window.scrollTo(0,0);
}

// 初期化
goSec('intro');
</script>
